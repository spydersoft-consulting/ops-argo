configFile: ""

alloy:
  controller:
    revisionHistoryLimit: 3
    podAnnotations:
      linkerd.io/inject: enabled
      config.linkerd.io/opaque-ports: "4317,4318"
  alloy:
    # Shard discovered targets across DaemonSet replicas via memberlist gossip.
    # Without this, every replica scrapes every cluster-wide target (nodes,
    # services, linkerd pods) independently, and near-simultaneous duplicate
    # pushes get rejected by Mimir as out-of-order samples.
    clustering:
      enabled: true
    resources:
      requests:
        cpu: 200m
        memory: 768Mi
      limits:
        cpu: "1"
        memory: 1536Mi
    extraPorts:
      - name: "otlp-grpc"
        port: 4317
        targetPort: 4317
        protocol: "TCP"
        appProtocol: "kubernetes.io/h2c"
      - name: "otlp-http"
        port: 4318
        targetPort: 4318
        protocol: "TCP"